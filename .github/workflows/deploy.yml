name: Deploy StockFlow to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/stockflow-backend
  ADMIN_BACKEND_IMAGE: ${{ github.repository }}/stockflow-admin-backend
  FRONTEND_IMAGE: ${{ github.repository }}/stockflow-frontend
  ADMIN_FRONTEND_IMAGE: ${{ github.repository }}/stockflow-admin-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest,${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push admin-backend image
        uses: docker/build-push-action@v5
        with:
          context: ./admin-backend
          file: ./admin-backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.ADMIN_BACKEND_IMAGE }}:latest,${{ env.REGISTRY }}/${{ env.ADMIN_BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest,${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push admin-frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./admin-frontend
          file: ./admin-frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.ADMIN_FRONTEND_IMAGE }}:latest,${{ env.REGISTRY }}/${{ env.ADMIN_FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-render:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deployment
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"commit_sha": "${{ github.sha }}"}'

  deploy-preview-comment:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            
            const comment = `## 🚀 Preview Deployment Ready!
            
            ### Access Links
            
            | Service | Preview URL |
            |---------|-------------|
            | **Business Frontend** | https://stockflow-frontend-${{ github.sha }}.vercel.app |
            | **Admin Frontend** | https://stockflow-admin-frontend-${{ github.sha }}.vercel.app |
            
            ### Test Accounts
            
            - **Username:** demo@test.com
            - **Password:** Demo123456
            
            ---
            *This preview will be available for 7 days*`;
            
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner,
              repo,
              body: comment
            });